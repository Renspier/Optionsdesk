<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Voice Timer</title>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0a0c10"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0c10;--surface:#13161d;--border:#1e2230;
  --accent:#00e5b4;--accentD:rgba(0,229,180,.12);
  --red:#ff4560;--redD:rgba(255,69,96,.12);
  --yellow:#fbbf24;--yellowD:rgba(251,191,36,.12);
  --blue:#3b82f6;--blueD:rgba(59,130,246,.12);
  --text:#e2e8f0;--muted:#64748b;--dim:#2a2f3d;
  --mono:ui-monospace,'Menlo','Consolas','Courier New',monospace;
  --sans:system-ui,-apple-system,'Segoe UI',sans-serif;
}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;
  -webkit-text-size-adjust:100%;overscroll-behavior:none;overflow-x:hidden}

/* Layout */
.app{display:flex;flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto;padding:0 16px}
header{padding:20px 0 12px;text-align:center}
header h1{font-size:20px;font-weight:700;letter-spacing:-.02em}
header h1 span{color:var(--accent)}
header p{color:var(--muted);font-size:13px;margin-top:4px}

/* Mic button */
.mic-section{display:flex;flex-direction:column;align-items:center;padding:24px 0}
.mic-btn{width:96px;height:96px;border-radius:50%;border:3px solid var(--border);
  background:var(--surface);color:var(--muted);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .25s ease;position:relative;outline:none}
.mic-btn svg{width:36px;height:36px;fill:currentColor;transition:fill .2s}
.mic-btn.listening{border-color:var(--accent);color:var(--accent);
  box-shadow:0 0 0 6px var(--accentD),0 0 30px var(--accentD);animation:pulse 1.8s infinite}
.mic-btn.listening svg{fill:var(--accent)}
@keyframes pulse{0%,100%{box-shadow:0 0 0 6px var(--accentD),0 0 30px var(--accentD)}
  50%{box-shadow:0 0 0 14px transparent,0 0 40px var(--accentD)}}
.mic-label{margin-top:12px;font-size:13px;color:var(--muted);min-height:20px;transition:color .2s}
.mic-label.active{color:var(--accent)}

/* Transcript */
.transcript-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:14px 16px;min-height:60px;margin-bottom:16px;font-size:14px;line-height:1.6;
  color:var(--text);position:relative;word-wrap:break-word}
.transcript-box.empty{color:var(--muted);font-style:italic}
.transcript-box .interim{color:var(--muted)}
.transcript-box .timer-match{background:var(--accentD);color:var(--accent);
  padding:2px 6px;border-radius:4px;font-weight:600;font-family:var(--mono);font-size:13px}

/* Timers list */
.timers-section{flex:1;padding-bottom:24px}
.timers-section h2{font-size:14px;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;
  display:flex;align-items:center;gap:8px}
.timers-section h2 .count{background:var(--accentD);color:var(--accent);
  font-size:11px;padding:2px 8px;border-radius:10px;font-weight:700}
.timer-list{display:flex;flex-direction:column;gap:10px}
.no-timers{color:var(--muted);font-size:13px;font-style:italic;text-align:center;padding:32px 0}

/* Timer card */
.timer-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:14px 16px;display:flex;align-items:center;gap:14px;
  transition:border-color .3s,box-shadow .3s}
.timer-card.running{border-color:var(--accent);box-shadow:0 0 0 1px var(--accentD)}
.timer-card.warning{border-color:var(--yellow);box-shadow:0 0 0 1px var(--yellowD);animation:flash 1s infinite}
.timer-card.done{border-color:var(--red);box-shadow:0 0 0 1px var(--redD);animation:flash .5s infinite}
@keyframes flash{0%,100%{opacity:1}50%{opacity:.7}}

.timer-ring{width:52px;height:52px;flex-shrink:0;position:relative}
.timer-ring svg{width:52px;height:52px;transform:rotate(-90deg)}
.timer-ring circle{fill:none;stroke-width:3.5}
.timer-ring .track{stroke:var(--dim)}
.timer-ring .progress{stroke:var(--accent);stroke-linecap:round;
  transition:stroke-dashoffset .5s linear,stroke .3s}
.timer-ring .progress.warning{stroke:var(--yellow)}
.timer-ring .progress.done{stroke:var(--red)}
.timer-ring .time-label{position:absolute;inset:0;display:flex;align-items:center;
  justify-content:center;font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:.02em}

.timer-info{flex:1;min-width:0}
.timer-info .label{font-size:14px;font-weight:600;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis}
.timer-info .meta{font-size:12px;color:var(--muted);margin-top:2px}

.timer-actions{display:flex;gap:6px;flex-shrink:0}
.timer-actions button{width:34px;height:34px;border-radius:8px;border:none;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  background:transparent;color:var(--muted);transition:all .15s}
.timer-actions button:hover{background:var(--dim);color:var(--text)}
.timer-actions button svg{width:16px;height:16px;fill:currentColor}
.timer-actions .pause-btn.paused{color:var(--accent)}
.timer-actions .stop-btn:hover{color:var(--red)}

/* History */
.history-toggle{background:none;border:1px solid var(--border);color:var(--muted);
  font-size:13px;padding:8px 16px;border-radius:8px;cursor:pointer;
  width:100%;margin-top:12px;transition:all .15s}
.history-toggle:hover{border-color:var(--dim);color:var(--text)}
.history-list{margin-top:10px}
.history-item{display:flex;justify-content:space-between;align-items:center;
  padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.history-item .h-label{color:var(--text)}
.history-item .h-time{color:var(--muted);font-family:var(--mono)}

/* Toast / notification */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-120%);
  background:var(--accent);color:#000;font-weight:700;font-size:14px;
  padding:10px 20px;border-radius:10px;z-index:1000;
  transition:transform .3s cubic-bezier(.4,0,.2,1);pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}

/* Clear all */
.clear-all{background:none;border:1px solid rgba(255,69,96,.2);color:var(--red);
  font-size:12px;padding:6px 14px;border-radius:8px;cursor:pointer;margin-left:auto;
  transition:all .15s}
.clear-all:hover{background:var(--redD)}

/* Permissions banner */
.perm-banner{background:var(--yellowD);border:1px solid rgba(251,191,36,.3);
  color:var(--yellow);border-radius:10px;padding:12px 16px;font-size:13px;
  margin-bottom:16px;text-align:center;line-height:1.5}

/* Manual add */
.manual-add{display:flex;gap:8px;margin-bottom:16px}
.manual-add input{flex:1;background:var(--surface);border:1px solid var(--border);
  color:var(--text);padding:10px 14px;border-radius:10px;font-size:14px;
  font-family:var(--sans);outline:none}
.manual-add input:focus{border-color:var(--accent)}
.manual-add input::placeholder{color:var(--muted)}
.manual-add button{background:var(--accent);color:#000;font-weight:700;
  padding:10px 18px;border-radius:10px;border:none;cursor:pointer;font-size:14px;
  white-space:nowrap;transition:opacity .15s}
.manual-add button:active{opacity:.8}

@media(max-width:380px){
  .mic-btn{width:80px;height:80px}
  .mic-btn svg{width:30px;height:30px}
}
</style>
</head>
<body>

<div class="app">
  <header>
    <h1>Voice <span>Timer</span></h1>
    <p>Speak to set timers &mdash; hands free</p>
  </header>

  <div class="mic-section">
    <button class="mic-btn" id="micBtn" aria-label="Toggle dictation">
      <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
    </button>
    <div class="mic-label" id="micLabel">Tap to start listening</div>
  </div>

  <div class="transcript-box empty" id="transcript">Say something like "Set a timer for 5 minutes"</div>

  <div class="manual-add">
    <input type="text" id="manualInput" placeholder='e.g. "10 min pizza"' />
    <button id="manualBtn">+ Add</button>
  </div>

  <div id="permBanner" class="perm-banner" style="display:none">
    Microphone permission is required for voice control. Tap the mic button and allow access.
  </div>

  <div class="timers-section">
    <h2>Timers <span class="count" id="timerCount">0</span>
      <button class="clear-all" id="clearAllBtn" style="display:none">Clear all</button>
    </h2>
    <div class="timer-list" id="timerList">
      <div class="no-timers" id="noTimers">No active timers. Use your voice or type above to create one.</div>
    </div>

    <button class="history-toggle" id="historyToggle" style="display:none">Show completed timers</button>
    <div class="history-list" id="historyList" style="display:none"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Alarm sound (generated via oscillator, no external file needed) -->
<script>
(function(){
'use strict';

// ─── State ───
let timers = [];
let history = [];
let timerIdCounter = 0;
let recognition = null;
let isListening = false;
let wakeLock = null;

// ─── DOM refs ───
const micBtn = document.getElementById('micBtn');
const micLabel = document.getElementById('micLabel');
const transcriptBox = document.getElementById('transcript');
const timerList = document.getElementById('timerList');
const timerCount = document.getElementById('timerCount');
const noTimers = document.getElementById('noTimers');
const clearAllBtn = document.getElementById('clearAllBtn');
const permBanner = document.getElementById('permBanner');
const toast = document.getElementById('toast');
const historyToggle = document.getElementById('historyToggle');
const historyList = document.getElementById('historyList');
const manualInput = document.getElementById('manualInput');
const manualBtn = document.getElementById('manualBtn');

// ─── Audio Context for alarm ───
let audioCtx = null;
function getAudioCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playAlarm(){
  const ctx = getAudioCtx();
  const now = ctx.currentTime;
  // Play a series of beeps
  for(let i = 0; i < 4; i++){
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.value = i % 2 === 0 ? 880 : 1100;
    gain.gain.setValueAtTime(0.3, now + i * 0.3);
    gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.3 + 0.25);
    osc.start(now + i * 0.3);
    osc.stop(now + i * 0.3 + 0.25);
  }
  // Vibrate if available
  if(navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 300]);
}

// ─── Toast ───
let toastTimeout;
function showToast(msg){
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => toast.classList.remove('show'), 2500);
}

// ─── Wake Lock (keep screen on) ───
async function requestWakeLock(){
  if('wakeLock' in navigator){
    try{ wakeLock = await navigator.wakeLock.request('screen'); }catch(e){}
  }
}
function releaseWakeLock(){
  if(wakeLock){ wakeLock.release(); wakeLock = null; }
}

// ─── Timer parsing ───
// Matches patterns like:
//   "set a timer for 5 minutes"
//   "timer 10 min"
//   "5 minute timer for eggs"
//   "remind me in 30 seconds"
//   "2 hours 30 minutes"
//   "1 and a half minutes"
//   "90 seconds for pasta"
//   "half hour"

const NUMBER_WORDS = {
  zero:0,one:1,two:2,three:3,four:4,five:5,six:6,seven:7,eight:8,nine:9,ten:10,
  eleven:11,twelve:12,thirteen:13,fourteen:14,fifteen:15,sixteen:16,seventeen:17,
  eighteen:18,nineteen:19,twenty:20,thirty:30,forty:40,fifty:50,sixty:60,
  'half':0.5,'quarter':0.25,'a':1,'an':1
};

function wordToNum(w){
  if(!w) return null;
  const n = Number(w);
  if(!isNaN(n)) return n;
  return NUMBER_WORDS[w.toLowerCase()] ?? null;
}

function parseTimerFromText(text){
  const t = text.toLowerCase().replace(/[.,!?]/g, '').trim();

  let totalSeconds = 0;
  let label = '';
  let matched = false;

  // Pattern: "half hour", "half an hour"
  if(/\bhalf\s+(an?\s+)?hour\b/.test(t)){
    totalSeconds += 1800;
    matched = true;
  }

  // Pattern: "quarter hour", "quarter of an hour"
  if(/\bquarter\s+(of\s+)?(an?\s+)?hour\b/.test(t)){
    totalSeconds += 900;
    matched = true;
  }

  // Pattern: "X and a half minutes/hours"
  const halfPat = /(\d+|one|two|three|four|five|six|seven|eight|nine|ten|eleven|twelve|fifteen|twenty|thirty|forty|fifty|sixty)\s+and\s+a\s+half\s+(hour|minute|min|second|sec)s?/gi;
  let hm;
  while((hm = halfPat.exec(t)) !== null){
    const val = wordToNum(hm[1]);
    if(val !== null){
      const unit = hm[2].toLowerCase();
      let mult = 1;
      if(unit.startsWith('hour')) mult = 3600;
      else if(unit.startsWith('min')) mult = 60;
      totalSeconds += (val + 0.5) * mult;
      matched = true;
    }
  }

  // Primary pattern: number + unit
  const pat = /(\d+\.?\d*|one|two|three|four|five|six|seven|eight|nine|ten|eleven|twelve|thirteen|fourteen|fifteen|sixteen|seventeen|eighteen|nineteen|twenty|thirty|forty|fifty|sixty|a|an)\s*(hours?|hrs?|minutes?|mins?|seconds?|secs?)/gi;
  let m;
  while((m = pat.exec(t)) !== null){
    // Skip if this was part of "and a half" match
    const beforeMatch = t.substring(0, m.index);
    if(beforeMatch.endsWith('and a half ')) continue;

    const val = wordToNum(m[1]);
    if(val !== null){
      const unit = m[2].toLowerCase();
      if(unit.startsWith('hour') || unit.startsWith('hr')) totalSeconds += val * 3600;
      else if(unit.startsWith('min')) totalSeconds += val * 60;
      else if(unit.startsWith('sec')) totalSeconds += val;
      matched = true;
    }
  }

  if(!matched || totalSeconds <= 0) return null;

  // Round to whole seconds
  totalSeconds = Math.round(totalSeconds);

  // Extract label: look for "for <something>" or "called <something>" at the end
  const labelPat = /(?:for|called|named|labeled?)\s+(?:the\s+)?(.+?)$/i;
  const lm = t.match(labelPat);
  if(lm){
    // Clean up: remove timer-related words from label
    label = lm[1].replace(/\b(timer|alarm|reminder|set|start)\b/gi, '').trim();
  }

  // If no label found, try to find a noun before "timer"
  if(!label){
    const prePat = /(.+?)\s+timer/i;
    const pm = t.match(prePat);
    if(pm){
      label = pm[1].replace(/\b(set|start|a|an|the|me|please)\b/gi, '').replace(/\d+\s*(hours?|hrs?|minutes?|mins?|seconds?|secs?)/gi, '').trim();
    }
  }

  if(!label) label = formatDuration(totalSeconds) + ' timer';

  return { seconds: totalSeconds, label: label };
}

function formatDuration(s){
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  const parts = [];
  if(h) parts.push(h + 'h');
  if(m) parts.push(m + 'm');
  if(sec || parts.length === 0) parts.push(sec + 's');
  return parts.join(' ');
}

function formatTimeDisplay(s){
  if(s < 0) s = 0;
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  if(h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  return `${m}:${String(sec).padStart(2,'0')}`;
}

// ─── Timer management ───
function createTimer(seconds, label){
  const id = ++timerIdCounter;
  const timer = {
    id, label, totalSeconds: seconds, remaining: seconds,
    state: 'running', // running | paused | done
    intervalId: null,
    createdAt: Date.now()
  };
  timers.unshift(timer);
  startTimerInterval(timer);
  renderTimers();
  showToast(`Timer set: ${label}`);
  requestWakeLock();
  return timer;
}

function startTimerInterval(timer){
  if(timer.intervalId) clearInterval(timer.intervalId);
  timer.lastTick = Date.now();
  timer.intervalId = setInterval(() => {
    if(timer.state !== 'running') return;
    const now = Date.now();
    const elapsed = Math.round((now - timer.lastTick) / 1000);
    if(elapsed >= 1){
      timer.remaining -= elapsed;
      timer.lastTick = now;
      if(timer.remaining <= 0){
        timer.remaining = 0;
        timer.state = 'done';
        clearInterval(timer.intervalId);
        timer.intervalId = null;
        playAlarm();
        showToast(`Timer done: ${timer.label}`);
      }
      renderTimerCard(timer);
      updateTimerCount();
    }
  }, 250);
}

function pauseTimer(id){
  const t = timers.find(x => x.id === id);
  if(!t) return;
  if(t.state === 'running'){
    t.state = 'paused';
    clearInterval(t.intervalId);
    t.intervalId = null;
  } else if(t.state === 'paused'){
    t.state = 'running';
    startTimerInterval(t);
  }
  renderTimerCard(t);
}

function dismissTimer(id){
  const t = timers.find(x => x.id === id);
  if(!t) return;
  if(t.intervalId) clearInterval(t.intervalId);
  timers = timers.filter(x => x.id !== id);
  history.unshift({ label: t.label, duration: formatDuration(t.totalSeconds), time: new Date().toLocaleTimeString() });
  renderTimers();
  if(timers.length === 0) releaseWakeLock();
}

function clearAllTimers(){
  timers.forEach(t => { if(t.intervalId) clearInterval(t.intervalId); });
  timers.forEach(t => {
    history.unshift({ label: t.label, duration: formatDuration(t.totalSeconds), time: new Date().toLocaleTimeString() });
  });
  timers = [];
  renderTimers();
  releaseWakeLock();
}

// ─── Rendering ───
function updateTimerCount(){
  const active = timers.filter(t => t.state !== 'done').length;
  const done = timers.filter(t => t.state === 'done').length;
  timerCount.textContent = timers.length;
  document.title = timers.length > 0
    ? (done > 0 ? `(${done} done!) Voice Timer` : `(${active}) Voice Timer`)
    : 'Voice Timer';
}

function renderTimers(){
  updateTimerCount();
  clearAllBtn.style.display = timers.length > 1 ? '' : 'none';
  noTimers.style.display = timers.length === 0 ? '' : 'none';
  historyToggle.style.display = history.length > 0 ? '' : 'none';

  // Remove cards that no longer exist
  const existingCards = timerList.querySelectorAll('.timer-card');
  existingCards.forEach(card => {
    const id = Number(card.dataset.id);
    if(!timers.find(t => t.id === id)) card.remove();
  });

  // Add/update cards
  timers.forEach((t, i) => {
    let card = timerList.querySelector(`.timer-card[data-id="${t.id}"]`);
    if(!card){
      card = document.createElement('div');
      card.className = 'timer-card';
      card.dataset.id = t.id;
      card.innerHTML = buildTimerCardHTML(t);
      // Insert at right position
      const ref = timerList.children[i];
      if(ref && ref !== noTimers) timerList.insertBefore(card, ref);
      else timerList.insertBefore(card, noTimers);
      // Attach events
      card.querySelector('.pause-btn').onclick = () => pauseTimer(t.id);
      card.querySelector('.stop-btn').onclick = () => dismissTimer(t.id);
    }
    renderTimerCard(t);
  });
}

function buildTimerCardHTML(t){
  const circ = 2 * Math.PI * 21;
  return `
    <div class="timer-ring">
      <svg viewBox="0 0 48 48">
        <circle class="track" cx="24" cy="24" r="21"/>
        <circle class="progress" cx="24" cy="24" r="21"
          stroke-dasharray="${circ}" stroke-dashoffset="0"/>
      </svg>
      <div class="time-label"></div>
    </div>
    <div class="timer-info">
      <div class="label">${escHTML(t.label)}</div>
      <div class="meta">${formatDuration(t.totalSeconds)}</div>
    </div>
    <div class="timer-actions">
      <button class="pause-btn" aria-label="Pause/Resume">
        <svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      <button class="stop-btn" aria-label="Dismiss">
        <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>`;
}

function renderTimerCard(t){
  const card = timerList.querySelector(`.timer-card[data-id="${t.id}"]`);
  if(!card) return;

  const circ = 2 * Math.PI * 21;
  const frac = t.totalSeconds > 0 ? t.remaining / t.totalSeconds : 0;
  const offset = circ * (1 - frac);
  const progress = card.querySelector('.progress');
  const timeLabel = card.querySelector('.time-label');
  const pauseBtn = card.querySelector('.pause-btn');

  progress.style.strokeDashoffset = offset;
  timeLabel.textContent = formatTimeDisplay(t.remaining);

  // States
  const isWarning = t.state === 'running' && t.remaining <= 10 && t.remaining > 0;
  const isDone = t.state === 'done';

  card.className = 'timer-card' + (isDone ? ' done' : isWarning ? ' warning' : t.state === 'running' ? ' running' : '');
  progress.classList.toggle('warning', isWarning);
  progress.classList.toggle('done', isDone);

  // Pause button icon
  if(t.state === 'paused'){
    pauseBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
    pauseBtn.classList.add('paused');
  } else {
    pauseBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';
    pauseBtn.classList.remove('paused');
  }

  if(isDone){
    timeLabel.textContent = 'Done!';
    card.querySelector('.meta').textContent = 'Finished';
  }
}

function renderHistory(){
  if(history.length === 0){
    historyList.style.display = 'none';
    historyToggle.style.display = 'none';
    return;
  }
  historyList.innerHTML = history.slice(0, 20).map(h =>
    `<div class="history-item"><span class="h-label">${escHTML(h.label)}</span><span class="h-time">${escHTML(h.duration)} &middot; ${escHTML(h.time)}</span></div>`
  ).join('');
}

function escHTML(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ─── Speech Recognition ───
function initSpeechRecognition(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){
    permBanner.textContent = 'Speech recognition is not supported in this browser. Use Chrome or Safari on your phone.';
    permBanner.style.display = '';
    return;
  }

  recognition = new SR();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';
  recognition.maxAlternatives = 1;

  let finalTranscript = '';
  let processedUpTo = 0; // track which final transcript text we already parsed

  recognition.onstart = () => {
    isListening = true;
    micBtn.classList.add('listening');
    micLabel.textContent = 'Listening...';
    micLabel.classList.add('active');
    finalTranscript = '';
    processedUpTo = 0;
  };

  recognition.onresult = (e) => {
    let interim = '';
    for(let i = e.resultIndex; i < e.results.length; i++){
      const transcript = e.results[i][0].transcript;
      if(e.results[i].isFinal){
        finalTranscript += transcript;
      } else {
        interim += transcript;
      }
    }

    // Display
    const display = finalTranscript + (interim ? `<span class="interim">${escHTML(interim)}</span>` : '');
    transcriptBox.innerHTML = display || '<span class="interim">Listening...</span>';
    transcriptBox.classList.remove('empty');

    // Parse only new final transcript text
    if(finalTranscript.length > processedUpTo){
      const newText = finalTranscript.substring(processedUpTo);
      processedUpTo = finalTranscript.length;

      const parsed = parseTimerFromText(newText);
      if(parsed){
        createTimer(parsed.seconds, parsed.label);
        // Highlight the match in transcript
        highlightTimerMatch(parsed.label);
      }
    }
  };

  recognition.onerror = (e) => {
    if(e.error === 'not-allowed'){
      permBanner.style.display = '';
      stopListening();
    } else if(e.error === 'no-speech'){
      // Ignore, just keep listening
    } else {
      console.warn('Speech error:', e.error);
    }
  };

  recognition.onend = () => {
    // Auto-restart if still supposed to be listening
    if(isListening){
      try{ recognition.start(); }catch(e){}
    } else {
      micBtn.classList.remove('listening');
      micLabel.textContent = 'Tap to start listening';
      micLabel.classList.remove('active');
    }
  };
}

function highlightTimerMatch(label){
  const current = transcriptBox.innerHTML;
  transcriptBox.innerHTML = current + ` <span class="timer-match">&#9201; ${escHTML(label)}</span>`;
}

function startListening(){
  if(!recognition) return;
  // Resume audio context (needed on iOS)
  getAudioCtx().resume();
  try{
    recognition.start();
    isListening = true;
  }catch(e){
    // Already started
  }
}

function stopListening(){
  isListening = false;
  if(recognition){
    try{ recognition.stop(); }catch(e){}
  }
  micBtn.classList.remove('listening');
  micLabel.textContent = 'Tap to start listening';
  micLabel.classList.remove('active');
}

// ─── Manual input ───
function handleManualAdd(){
  const text = manualInput.value.trim();
  if(!text) return;
  const parsed = parseTimerFromText(text);
  if(parsed){
    createTimer(parsed.seconds, parsed.label);
    manualInput.value = '';
  } else {
    // Try simple number as minutes
    const n = parseFloat(text);
    if(!isNaN(n) && n > 0){
      createTimer(Math.round(n * 60), formatDuration(Math.round(n * 60)) + ' timer');
      manualInput.value = '';
    } else {
      showToast('Could not parse a timer. Try "5 minutes" or "10 min pizza"');
    }
  }
}

// ─── Voice commands for controlling timers ───
function checkVoiceCommands(text){
  const t = text.toLowerCase().trim();

  // "stop all timers" / "cancel all"
  if(/\b(stop|cancel|clear)\s+(all|every)\s*(timer)?s?\b/.test(t)){
    clearAllTimers();
    showToast('All timers cleared');
    return true;
  }

  // "pause timer" / "resume timer"
  if(/\b(pause|resume)\s*(timer|all)?\b/.test(t)){
    const action = t.includes('pause') ? 'pause' : 'resume';
    timers.forEach(timer => {
      if(action === 'pause' && timer.state === 'running') pauseTimer(timer.id);
      else if(action === 'resume' && timer.state === 'paused') pauseTimer(timer.id);
    });
    showToast(action === 'pause' ? 'Timers paused' : 'Timers resumed');
    return true;
  }

  return false;
}

// ─── Event listeners ───
micBtn.addEventListener('click', () => {
  if(isListening) stopListening();
  else startListening();
});

manualBtn.addEventListener('click', handleManualAdd);
manualInput.addEventListener('keydown', (e) => {
  if(e.key === 'Enter') handleManualAdd();
});

clearAllBtn.addEventListener('click', () => {
  if(confirm('Clear all timers?')) clearAllTimers();
});

let historyVisible = false;
historyToggle.addEventListener('click', () => {
  historyVisible = !historyVisible;
  historyList.style.display = historyVisible ? '' : 'none';
  historyToggle.textContent = historyVisible ? 'Hide completed timers' : 'Show completed timers';
  if(historyVisible) renderHistory();
});

// Re-acquire wake lock on visibility change
document.addEventListener('visibilitychange', () => {
  if(document.visibilityState === 'visible' && timers.length > 0) requestWakeLock();
});

// ─── Init ───
initSpeechRecognition();

})();
</script>
